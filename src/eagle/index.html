<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab Eagle</title>
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div class="title-block">
          <h1>Tab Eagle</h1>
          <p id="tab-count">Loading tabs...</p>
        </div>

        <div class="toolbar">
          <md-outlined-segmented-button-set class="sort-control" aria-label="Sort tabs">
            <md-outlined-segmented-button label="Position" data-sort="position" selected></md-outlined-segmented-button>
            <md-outlined-segmented-button label="Domain" data-sort="domain"></md-outlined-segmented-button>
            <md-outlined-segmented-button label="Recent" data-sort="recent" no-checkmark></md-outlined-segmented-button>
          </md-outlined-segmented-button-set>

          <md-outlined-button id="return-origin" type="button">Return to origin</md-outlined-button>
        </div>
      </header>

      <section id="status" class="status" role="status" aria-live="polite"></section>
      <section id="tab-grid" class="tab-grid" role="grid" aria-label="Tabs"></section>
    </main>
  </body>
</html>
